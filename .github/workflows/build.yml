name: Build VCam

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  THEOS: $HOME/theos
  PATH: $HOME/theos/bin:${{ env.PATH }}

jobs:
  build:
    name: Build iOS Tweak
    runs-on: macos-14
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        brew install ldid xz
      timeout-minutes: 10

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $THEOS
      timeout-minutes: 10

    - name: Install iPhoneOS 16.5 SDK
      run: |
        curl -fsSL https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz -o /tmp/sdk.tar.xz
        mkdir -p $THEOS/sdks
        tar -xf /tmp/sdk.tar.xz -C $THEOS/sdks
        ls $THEOS/sdks/
      timeout-minutes: 10

    - name: Fix DEBIAN script permission (solve postinst 644 error)
      run: |
        if [ -f layout/DEBIAN/postinst ]; then
          chmod 755 layout/DEBIAN/postinst
          echo "Fixed postinst permission to 755"
        else
          echo "postinst file not found, skip permission fix"
        fi

    - name: Compile & Package Tweak
      run: |
        make clean
        make package FINALPACKAGE=1 2>&1
        echo "==== Generated deb files ===="
        ls -lh packages/
      timeout-minutes: 15

    - name: Prepare output folder & copy deb
      run: |
        mkdir -p output
        DEB=$(ls packages/*.deb | head -1)
        if [ -z "$DEB" ]; then
          echo "ERROR: No deb package generated!"
          exit 1
        fi
        cp "$DEB" output/
        echo "Copied package: $DEB"

    - name: Extract dylib from deb
      run: |
        cd output
        DEB_FILE=$(ls *.deb)
        # 标准dpkg-deb解压，稳定不报错
        dpkg-deb -x "$DEB_FILE" extract_tmp
        # 复制第一个找到的dylib到根目录
        DYLIB=$(find extract_tmp -name "*.dylib" | head -1)
        if [ -n "$DYLIB" ]; then
          cp "$DYLIB" ./VCam.dylib
          echo "Extracted dylib: $DYLIB"
        else
          echo "Warning: No dylib found inside deb"
        fi
        ls -lh

    - name: Upload compiled dylib artifact
      uses: actions/upload-artifact@v4
      with:
        name: VCam-dylib
        path: output/VCam.dylib
        retention-days: 30

    - name: Upload deb install package artifact
      uses: actions/upload-artifact@v4
      with:
        name: VCam-deb
        path: output/*.deb
        retention-days: 30
